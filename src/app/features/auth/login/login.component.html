<div class="login-wrap">
  <div class="login-card">
    <div class="brand">
      <span class="brand-icon">⬡</span>
      <span class="brand-name">Productos</span>
    </div>

    <h1 class="title">Iniciar sesión</h1>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="field">
        <label for="username">Usuario</label>
        <input
          id="username"
          type="text"
          formControlName="username"
          placeholder="admin"
          autocomplete="username"
          [class.invalid]="form.controls.username.invalid && form.controls.username.touched"
        />
        @if (form.controls.username.invalid && form.controls.username.touched) {
          <span class="field-error">Campo requerido</span>
        }
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          autocomplete="current-password"
          [class.invalid]="form.controls.password.invalid && form.controls.password.touched"
        />
        @if (form.controls.password.invalid && form.controls.password.touched) {
          <span class="field-error">Mínimo 4 caracteres</span>
        }
      </div>

      @if (error()) {
        <div class="alert">{{ error() }}</div>
      }

      <button type="submit" class="btn-login" [disabled]="loading()">
        @if (loading()) { Entrando… } @else { Entrar }
      </button>
    </form>
  </div>
</div>
